# ==============================================================
# OFOS — Common Configuration
# ==============================================================

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

spring:
  application:
    name: ofos

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Jackson
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ==============================================================
# JWT Configuration
# ==============================================================
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-min-256-bit-key-required-here}
    access-token-expiration-ms: 1800000
    refresh-token-expiration-ms: 604800000

# ==============================================================
# API Documentation
# ==============================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ==============================================================
# Actuator
# ==============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized