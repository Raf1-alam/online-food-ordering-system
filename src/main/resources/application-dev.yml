# ==============================================================
# OFOS — Development Profile
# ==============================================================

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ofos_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway — use 'update' in dev for convenience, 'validate' in prod
  flyway:
    enabled: true

# Swagger enabled in dev
springdoc:
  swagger-ui:
    enabled: true

# Actuator — more open in dev
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
